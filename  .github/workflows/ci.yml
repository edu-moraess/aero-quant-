name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install core + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests scripts

      - name: Type check (mypy)
        run: mypy src
        continue-on-error: true # habilitar como bloqueante conforme o typing do projeto amadurece

      - name: Run unit tests
        run: pytest tests/unit --cov=aeroquant --cov-report=term-missing

      - name: Run integration tests
        run: pytest tests/integration --cov=aeroquant --cov-append --cov-report=xml

  # Job de exemplo para expansão futura (v1.0+): treino de modelos de ML/CV em
  # runners com GPU, build de imagem Docker, deploy do dashboard, etc.
